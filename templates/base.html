<!DOCTYPE html>
<html lang="pt">

<head>
    
    {% include 'parciais/_head.html' %}
    
</head>

<body>

<div id="global-loading-overlay" class="d-none position-fixed top-0 start-0 w-100 h-100" style="background: rgba(255, 255, 255, 0.82); z-index: 2000;">
    <div class="w-100 h-100 d-flex flex-column justify-content-center align-items-center gap-3">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status" aria-hidden="true"></div>
        <div class="fw-semibold text-dark">Carregando cursos EAD...</div>
    </div>
</div>
    
<div class="container">
    {% include 'parciais/_nav.html' %}

<!-- Page Content -->

    <div class="row">
        <div class="col-lg-12 pb-3">
            {% block content %}
            {% endblock %}
        </div>
    </div>
    
</div>



<script>
    let startTime = Date.now();

    window.addEventListener('beforeunload', function (event) {
        let endTime = Date.now();
        let timeSpent = endTime - startTime;

        navigator.sendBeacon('/log-time/', JSON.stringify({
            'url': window.location.pathname,
            'time_spent': timeSpent
        }));
    });

    document.addEventListener('DOMContentLoaded', function () {
        const overlay = document.getElementById('global-loading-overlay');
        const eadLinks = document.querySelectorAll('.js-ead-loading-link');

        eadLinks.forEach(function (link) {
            link.addEventListener('click', function () {
                if (!overlay) {
                    return;
                }
                overlay.classList.remove('d-none');
                document.body.style.cursor = 'progress';
            });
        });
    });
</script>

</body>

</html>
